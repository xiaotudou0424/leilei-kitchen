<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>蕾蕾香喷喷厨房</title>
  <link rel="stylesheet" href="style.css" />
  <!-- 二维码库替换为纯JavaScript实现 -->
</head>
<body>

<!-- ========== 主界面（管理员视角） ========== -->
<div id="app-owner" class="app-page active">

  <!-- 顶部导航 -->
  <header class="top-header">
    <div class="header-left">
      <span class="chef-icon">👨‍🍳</span>
      <div>
        <h1 class="app-title">蕾蕾香喷喷厨房</h1>
        <p class="app-subtitle">用心烹饪，分享美食</p>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon" onclick="showQRCode()" title="生成点餐二维码">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20h3"/></svg>
      </button>
      <button class="btn-icon" onclick="showPage('manage')" title="管理菜品">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
  </header>

  <!-- 分类标签 -->
  <div class="category-bar" id="categoryBar">
    <button class="cat-btn active" onclick="filterCategory('全部', this)">全部</button>
    <button class="cat-btn" onclick="filterCategory('热菜', this)">热菜</button>
    <button class="cat-btn" onclick="filterCategory('凉菜', this)">凉菜</button>
    <button class="cat-btn" onclick="filterCategory('汤类', this)">汤类</button>
    <button class="cat-btn" onclick="filterCategory('主食', this)">主食</button>
    <button class="cat-btn" onclick="filterCategory('甜品', this)">甜品</button>
  </div>

  <!-- 搜索栏 -->
  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="搜索菜品..." oninput="searchDishes()" />
  </div>

  <!-- 菜品网格 -->
  <div class="dish-grid" id="dishGrid"></div>

  <!-- 底部添加按钮 -->
  <button class="fab" onclick="showPage('add-dish')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<!-- ========== 菜品详情页 ========== -->
<div id="app-detail" class="app-page">
  <div class="detail-header">
    <button class="btn-back" onclick="showPage('owner')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h2 id="detailTitle">菜品详情</h2>
    <button class="btn-edit" id="detailEditBtn" onclick="editCurrentDish()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </div>
  <div id="detailContent" class="detail-content"></div>
</div>

<!-- ========== 管理页 ========== -->
<div id="app-manage" class="app-page">
  <div class="page-header">
    <button class="btn-back" onclick="showPage('owner')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h2>菜品管理</h2>
    <button class="btn-text-primary" onclick="showPage('add-dish')">+ 新增</button>
  </div>
  <div class="manage-list" id="manageList"></div>
</div>

<!-- ========== 添加/编辑菜品 ========== -->
<div id="app-add-dish" class="app-page">
  <div class="page-header">
    <button class="btn-back" onclick="showPage('manage')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h2 id="formTitle">添加菜品</h2>
    <button class="btn-text-primary" onclick="saveDish()">保存</button>
  </div>
  <div class="form-content">
    <input type="hidden" id="editId" />

    <!-- 图片上传 -->
    <div class="form-section">
      <label class="form-label">菜品图片</label>
      <div class="img-upload-area" id="imgUploadArea" onclick="document.getElementById('imgFileInput').click()">
        <img id="imgPreview" src="" alt="" style="display:none" />
        <div id="imgPlaceholder">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <p>点击上传图片</p>
        </div>
        <input type="file" id="imgFileInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none" />
      </div>
      <div class="or-divider">或输入图片网址</div>
      <input type="text" class="form-input" id="imgUrl" placeholder="https://..." oninput="handleImgUrlInput()" />
    </div>

    <!-- 基本信息 -->
    <div class="form-section">
      <label class="form-label">菜品名称 <span class="required">*</span></label>
      <input type="text" class="form-input" id="dishName" placeholder="如：红烧肉" />
    </div>

    <div class="form-row">
      <div class="form-section half">
        <label class="form-label">分类</label>
        <select class="form-input" id="dishCategory">
          <option value="热菜">热菜</option>
          <option value="凉菜">凉菜</option>
          <option value="汤类">汤类</option>
          <option value="主食">主食</option>
          <option value="甜品">甜品</option>
        </select>
      </div>
      <div class="form-section half">
        <label class="form-label">烹饪时间</label>
        <input type="text" class="form-input" id="dishTime" placeholder="如：45分钟" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-section half">
        <label class="form-label">食材成本 (元)</label>
        <input type="number" class="form-input" id="dishCost" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="form-section half">
        <label class="form-label">菜单售价 (元)</label>
        <input type="number" class="form-input" id="dishPrice" placeholder="0.00" min="0" step="0.01" />
      </div>
    </div>

    <div class="form-section">
      <label class="form-label">菜品描述</label>
      <textarea class="form-input form-textarea" id="dishDesc" placeholder="简单描述这道菜的特点、口味..."></textarea>
    </div>

    <!-- 食材原料 -->
    <div class="form-section">
      <div class="section-title-row">
        <label class="form-label">食材原料</label>
        <button class="btn-add-small" onclick="addIngredient()">+ 添加</button>
      </div>
      <div id="ingredientList" class="ingredient-list"></div>
    </div>

    <!-- 烹饪步骤 -->
    <div class="form-section">
      <div class="section-title-row">
        <label class="form-label">烹饪步骤</label>
        <button class="btn-add-small" onclick="addStep()">+ 添加</button>
      </div>
      <div id="stepList" class="step-list"></div>
    </div>

    <!-- 烹饪小贴士 -->
    <div class="form-section">
      <label class="form-label">烹饪小贴士</label>
      <textarea class="form-input form-textarea" id="dishTips" placeholder="记录一些烹饪技巧或注意事项..."></textarea>
    </div>

    <div style="height: 40px;"></div>
  </div>
</div>

<!-- ========== 点餐页（顾客扫码后看到） ========== -->
<div id="app-order" class="app-page">
  <header class="order-header">
    <div class="order-header-bg"></div>
    <div class="order-header-content">
      <span class="chef-icon-lg">👨‍🍳</span>
      <h1>蕾蕾香喷喷厨房</h1>
      <p>新鲜食材，用心烹饪</p>
    </div>
  </header>

  <div class="order-category-bar" id="orderCategoryBar">
    <button class="cat-btn active" onclick="filterOrderCategory('全部', this)">全部</button>
    <button class="cat-btn" onclick="filterOrderCategory('热菜', this)">热菜</button>
    <button class="cat-btn" onclick="filterOrderCategory('凉菜', this)">凉菜</button>
    <button class="cat-btn" onclick="filterOrderCategory('汤类', this)">汤类</button>
    <button class="cat-btn" onclick="filterOrderCategory('主食', this)">主食</button>
    <button class="cat-btn" onclick="filterOrderCategory('甜品', this)">甜品</button>
  </div>

  <div class="order-grid" id="orderGrid"></div>

  <!-- 购物车悬浮按钮 -->
  <div class="cart-bar" id="cartBar" style="display:none">
    <div class="cart-bar-left" onclick="showCart()">
      <div class="cart-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </div>
      <span class="cart-total" id="cartTotal">¥0.00</span>
    </div>
    <button class="btn-order-submit" onclick="submitOrder()">提交点单</button>
  </div>
</div>

<!-- ========== 点餐详情页 ========== -->
<div id="app-order-detail" class="app-page">
  <div class="detail-header">
    <button class="btn-back" onclick="showPage('order')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h2 id="orderDetailTitle">菜品详情</h2>
    <div style="width:40px"></div>
  </div>
  <div id="orderDetailContent" class="detail-content"></div>
</div>

<!-- ========== 购物车弹窗 ========== -->
<div id="cartModal" class="modal-overlay" onclick="closeCart(event)">
  <div class="modal-sheet" id="cartSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>已选菜品</h3>
      <button onclick="clearCart()" class="btn-clear-cart">清空</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-summary">
        <span>共 <b id="cartCount">0</b> 道菜</span>
        <span>合计：<b id="cartSummaryTotal">¥0.00</b></span>
      </div>
      <button class="btn-submit-full" onclick="submitOrder()">提交点单</button>
    </div>
  </div>
</div>

<!-- ========== 点单成功弹窗 ========== -->
<div id="orderSuccessModal" class="modal-overlay" onclick="closeOrderSuccess()">
  <div class="success-modal">
    <div class="success-icon">🎉</div>
    <h3>点单成功！</h3>
    <p id="orderSuccessText">您的点单已提交，请等待厨师制作</p>
    <button class="btn-primary-full" onclick="closeOrderSuccess()">好的</button>
  </div>
</div>

<!-- ========== 二维码弹窗 ========== -->
<div id="qrModal" class="modal-overlay" onclick="closeQR(event)">
  <div class="qr-modal">
    <h3>扫码点餐</h3>
    <p class="qr-hint">将此二维码分享给朋友</p>
    <div id="qrcode" class="qr-box"></div>
    <p class="qr-url" id="qrUrl"></p>
    <button class="btn-primary-full" onclick="closeQR()">关闭</button>
  </div>
</div>

<!-- ========== 删除确认弹窗 ========== -->
<div id="deleteModal" class="modal-overlay" onclick="closeDeleteModal(event)">
  <div class="confirm-modal">
    <div class="confirm-icon">⚠️</div>
    <h3>确认删除</h3>
    <p>删除后无法恢复，确认删除这道菜吗？</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
      <button class="btn-danger" id="confirmDeleteBtn">删除</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
